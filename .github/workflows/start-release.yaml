name: Release Please

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Type of release'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
        default: 'patch'
      release_from_branch:
        description: 'Source branch (usually develop)'
        required: false
        type: string
        default: 'develop'
      release_to_branch:
        description: 'Target branch (usually master/main)'
        required: false
        type: string
        default: 'master'
      dry_run:
        description: 'Dry run - preview what would happen without making changes'
        required: false
        type: boolean
        default: false

jobs:
  create_release:
    name: Create Release Branch and PR
    uses: MagnaBC/trafman-devops/.github/workflows/reusable-create-release.yaml@master
    with:
      release_type: ${{ inputs.release_type }}
      release_from_branch: ${{ inputs.release_from_branch }}
      release_to_branch: ${{ inputs.release_to_branch }}
      dry_run: ${{ inputs.dry_run }}
    secrets:
      MAGNABOT_GH_TOKEN: ${{ secrets.MAGNABOT_GH_TOKEN }}

  summary:
    name: Release Summary
    needs: create_release
    runs-on: trafman
    steps:
      - name: Display Summary
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            echo "## 🏃 Dry Run - Release Preview" >> $GITHUB_STEP_SUMMARY
          else
            echo "## 🚀 Release Process Started" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Release Information" >> $GITHUB_STEP_SUMMARY
          echo "- **Release Version**: ${{ needs.create_release.outputs.release_version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Next Snapshot**: ${{ needs.create_release.outputs.next_snapshot }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Release Type**: ${{ inputs.release_type }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Source Branch**: ${{ inputs.release_from_branch }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Target Branch**: ${{ inputs.release_to_branch }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            echo "### Dry Run Complete" >> $GITHUB_STEP_SUMMARY
            echo "No branches, PRs, or tags were created." >> $GITHUB_STEP_SUMMARY
            echo "Review the create-release job summary above for full details." >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "To perform the actual release, re-run this workflow with **dry_run unchecked**." >> $GITHUB_STEP_SUMMARY
          else
            echo "### Next Steps" >> $GITHUB_STEP_SUMMARY
            echo "1. ✅ Release branch created: \`release/${{ needs.create_release.outputs.release_version }}\`" >> $GITHUB_STEP_SUMMARY
            echo "2. ✅ Pull Request created" >> $GITHUB_STEP_SUMMARY
            echo "3. ⏳ Review and approve the Pull Request" >> $GITHUB_STEP_SUMMARY
            echo "4. ⏳ Merge the Pull Request (this will trigger automatic tagging)" >> $GITHUB_STEP_SUMMARY
            echo "5. ⏳ After merge, develop will be automatically updated" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Important Notes" >> $GITHUB_STEP_SUMMARY
            echo "- 🔍 Review all changes in the Pull Request before merging" >> $GITHUB_STEP_SUMMARY
            echo "- ✅ Ensure all tests pass" >> $GITHUB_STEP_SUMMARY
            echo "- 📝 Update release notes if needed" >> $GITHUB_STEP_SUMMARY
            echo "- 🏷️ Tag and GitHub Release will be created automatically after merge" >> $GITHUB_STEP_SUMMARY
            echo "- 🔄 Develop branch will be updated automatically after merge" >> $GITHUB_STEP_SUMMARY
          fi
